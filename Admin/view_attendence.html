<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Viewer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    font-family: 'Poppins', sans-serif;
    background: #f4f7fe;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#1b2a52,#29417d);
    color: white;
    padding: 40px 20px;
    text-align: center;
    border-radius: 0 0 30px 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.header h2{
    font-weight: 700;
    margin-bottom: 8px;
}

.header p{
    opacity: 0.85;
}

/* MAIN CARD */
.container-box{
    background: white;
    margin-top: 30px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* DATE INPUT */
.form-control{
    height: 50px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

.form-control:focus{
    box-shadow: none;
    border-color: #0d6efd;
}

/* BUTTON */
.btn-view{
    background: linear-gradient(135deg,#198754,#20c997);
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-view:hover{
    transform: scale(1.05);
}

/* TABLE */
.table{
    margin-top: 20px;
    border-radius: 12px;
    overflow: hidden;
}

.table thead{
    background: #1b2a52;
    color: white;
}

.table th{
    padding: 15px;
    font-weight: 600;
}

.table td{
    padding: 14px;
    vertical-align: middle;
}

.table tbody tr:hover{
    background: #f1f5ff;
}

/* EMPTY BOX */
.empty-box{
    text-align: center;
    padding: 40px;
    color: #888;
}

.empty-box i{
    font-size: 40px;
    margin-bottom: 10px;
}

/* FOOTER */
.footer{
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #666;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2><i class="fa-solid fa-calendar-days"></i> Attendance History Viewer</h2>
    <p>Check student attendance for any date</p>
</div>

<div class="container">

<div class="container-box">

<!-- DATE SELECT -->
<div class="row g-3">

<div class="col-md-4">
    <label class="fw-semibold">Select Date</label>
    <input type="date" id="dateInput" class="form-control">
</div>

<div class="col-md-4 d-flex align-items-end gap-2">
    <button class="btn-view w-50" onclick="loadAttendance()">
        <i class="fa fa-search"></i> View
    </button>
    <a href="index.html" class="btn btn-dark w-50 py-2 d-flex align-items-center justify-content-center" style="border-radius: 12px; height: 50px; font-weight: 600;">
        <i class="fa-solid fa-house me-2"></i> Admin Home
    </a>
</div>

</div>

<!-- TABLE -->
<div class="table-responsive mt-4">

<table class="table table-hover text-center">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Class</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Attendance Management System
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>

// LOAD DATA
async function loadAttendance(){

let date = document.getElementById("dateInput").value;
let table = document.getElementById("tableBody");

table.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

// VALIDATION
if(!date){
    table.innerHTML = `
    <tr><td colspan="4">⚠ Please select a date</td></tr>`;
    return;
}

// Fetch from Supabase
const { data, error } = await _supabase
    .from('attendance')
    .select(`
        status,
        student_id,
        students (
            name,
            student_class
        )
    `)
    .eq('date', date);

if (error) {
    console.error("Error loading attendance:", error);
    table.innerHTML = "<tr><td colspan='4' class='text-danger'>Error loading attendance</td></tr>";
    return;
}

// NO DATA
if(data.length === 0){
    table.innerHTML = `
    <tr>
        <td colspan="4">
            <div class="empty-box">
                <i class="fa-solid fa-calendar-xmark"></i>
                <p>No attendance found for selected date</p>
            </div>
        </td>
    </tr>`;
    return;
}

table.innerHTML = "";

// SHOW DATA
data.forEach(s => {

let studentName = s.students ? s.students.name : 'Unknown';
let studentClass = s.students ? s.students.student_class : 'Unknown';

table.innerHTML += `
<tr>
<td>${s.student_id}</td>
<td>${studentName}</td>
<td>${studentClass}</td>
<td>
    <span class="badge bg-${s.status === 'Present' ? 'success' : 'danger'}">
        ${s.status}
    </span>
</td>
</tr>
`;

});

}

</script>

</body>
</html>
