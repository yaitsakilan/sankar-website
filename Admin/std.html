<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Attendance Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            font-family:Arial, sans-serif;
        }

        .main-box{
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.2);
            position: relative;
        }

        .back-home-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f4f6f9;
            color: #1e3c72;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            transition: 0.3s;
        }

        .back-home-btn:hover{
            background: #1e3c72;
            color: white;
            transform: translateX(-3px);
        }

        .title{
            color:#1e3c72;
            font-weight:bold;
        }

        .search-box{
            background:#f4f6f9;
            border-radius:15px;
            padding:20px;
        }

        .card-box{
            border-radius:20px;
            color:white;
            padding:20px;
            margin-top:20px;
        }

        .present-card{
            background:linear-gradient(135deg,#11998e,#38ef7d);
        }

        .absent-card{
            background:linear-gradient(135deg,#ff416c,#ff4b2b);
        }

        .percentage-card{
            background:linear-gradient(135deg,#4776E6,#8E54E9);
        }

        .table th{
            background:#1e3c72;
            color:white;
        }

        .present{
            color:green;
            font-weight:bold;
        }

        .absent{
            color:red;
            font-weight:bold;
        }

        .student-name{
            color:#2a5298;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container py-5">

    <div class="main-box">

        <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>

        <h2 class="text-center title mb-4">
            <i class="fa-solid fa-user-graduate"></i>
            Student Attendance Portal
        </h2>

        <!-- SEARCH -->

        <div class="search-box">

            <div class="row g-3">

                <div class="col-md-9">

                    <input type="text"
                           id="studentId"
                           class="form-control form-control-lg"
                           placeholder="Enter Student ID">

                </div>

                <div class="col-md-3 d-flex gap-2">

                    <button class="btn btn-primary btn-lg w-100"
                            onclick="searchAttendance()">

                        View Attendance

                    </button>

                    <a href="index.html" class="btn btn-dark btn-lg" title="Admin Home">
                        <i class="fa-solid fa-house"></i>
                    </a>

                </div>

            </div>

        </div>

        <!-- STUDENT INFO -->

        <div id="studentResult" style="display:none;">

            <div class="text-center mt-4">

                <h3 class="student-name"
                    id="studentName"></h3>

            </div>

            <!-- CARDS -->

            <div class="row mt-4">

                <div class="col-md-4">

                    <div class="card-box present-card">

                        <h4>Present Days</h4>

                        <h1 id="presentCount">0</h1>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card-box absent-card">

                        <h4>Absent Days</h4>

                        <h1 id="absentCount">0</h1>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card-box percentage-card">

                        <h4>Attendance %</h4>

                        <h1 id="attendancePercentage">0%</h1>

                    </div>

                </div>

            </div>

            <!-- TABLE -->

            <div class="table-responsive mt-5">

                <table class="table table-bordered table-hover">

                    <thead>

                        <tr>

                            <th>Day</th>
                            <th>Date</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="attendanceTable">
                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>

// SEARCH ATTENDANCE
async function searchAttendance(){

    let studentId =
        document.getElementById("studentId").value;

    if (!studentId) {
        alert("Please enter Student ID");
        return;
    }

    const { data: records, error } = await _supabase
        .from('attendance')
        .select(`
            date,
            status,
            students (
                name,
                student_class
            )
        `)
        .eq('student_id', studentId)
        .order('date', { ascending: false });

    if (error) {
        console.error("Error fetching attendance portal data:", error);
        alert("Error retrieving data: " + error.message);
        return;
    }

    if(records.length == 0){

        alert("Student Attendance Not Found");

        return;
    }

    document.getElementById("studentResult").style.display =
        "block";

    let studentName = records[0].students ? records[0].students.name : 'Unknown';
    let studentClass = records[0].students ? records[0].students.student_class : 'Unknown';

    document.getElementById("studentName").innerHTML =
        studentName +
        " (" + studentClass + ")";

    let table =
        document.getElementById("attendanceTable");

    table.innerHTML = "";

    let present = 0;
    let absent = 0;

    records.forEach(record => {

        if(record.status == "Present"){
            present++;
        }
        else{
            absent++;
        }

        // Get day name
        let dateObj = new Date(record.date);
        let dayName = dateObj.toLocaleDateString('en-US', { weekday: 'long' });

        table.innerHTML += `

            <tr>

                <td>${dayName}</td>

                <td>${record.date}</td>

                <td class="${
                    record.status == 'Present'
                    ? 'present'
                    : 'absent'
                }">

                    ${record.status}

                </td>

            </tr>

        `;

    });

    let total =
        present + absent;

    let percentage = total > 0 ? ((present / total) * 100).toFixed(1) : 0;

    document.getElementById("presentCount").innerHTML =
        present;

    document.getElementById("absentCount").innerHTML =
        absent;

    document.getElementById("attendancePercentage").innerHTML =
        percentage + "%";

}

</script>

</body>
</html>
