<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fees Receipt - Sivani Coaching Center</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fe;
        }

        /* HEADER */

        .header-section{
            background:linear-gradient(135deg,#1b2a52,#29417d);
            color:white;
            text-align:center;
            padding:45px 20px;
            border-bottom-left-radius:30px;
            border-bottom-right-radius:30px;
            position: relative;
        }

        .back-home-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            transition: 0.3s;
        }

        .back-home-btn:hover{
            background: white;
            color: #1b2a52;
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-section h1{
            font-size:42px;
            font-weight:700;
        }

        .header-section p{
            margin-top:10px;
            font-size:17px;
        }

        /* MAIN BOX */

        .main-box{
            background:white;
            margin-top:40px;
            padding:35px;
            border-radius:25px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.08);
        }

        .section-title{
            color:#1b2a52;
            font-weight:700;
            margin-bottom:25px;
        }

        /* FORM */

        .form-control{
            height:55px;
            border-radius:12px;
        }

        .btn-main{
            height:55px;
            border:none;
            border-radius:12px;
            font-weight:600;
        }

        .btn-download{
            background:#198754;
            color:white;
        }

        .btn-download:hover{
            background:#146c43;
        }

        /* RECEIPT */

        .receipt-box{
            margin-top:40px;
            border:2px dashed #1b2a52;
            border-radius:20px;
            padding:35px;
            background:#fdfdfd;
        }

        .receipt-header{
            text-align:center;
            margin-bottom:30px;
        }

        .receipt-header h2{
            color:#1b2a52;
            font-weight:700;
        }

        .receipt-header h5{
            color:#198754;
        }

        .receipt-details{
            margin-top:20px;
        }

        .receipt-details p{
            font-size:18px;
            margin-bottom:12px;
        }

        .amount-box{
            background:#eef3ff;
            padding:20px;
            border-radius:15px;
            margin-top:20px;
            text-align:center;
        }

        .amount-box h1{
            color:#198754;
            font-weight:700;
        }

        .signature{
            margin-top:60px;
            text-align:right;
        }

        .footer{
            text-align:center;
            margin-top:40px;
            padding:20px;
            color:#666;
        }

        @media print{

            .no-print{
                display:none;
            }

            body{
                background:white;
            }

            .receipt-box{
                box-shadow:none;
                border:2px solid black;
            }

        }

    </style>

</head>

<body>

<section class="header-section no-print">

    <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>

    <div class="container">

        <h1>
            <i class="fa-solid fa-receipt"></i>
            Fees Receipt Generator
        </h1>

        <p>
            Sivani Coaching Center
        </p>

    </div>

</section>

<!-- MAIN -->

<div class="container">

    <div class="main-box no-print">

        <h3 class="section-title">

            <i class="fa-solid fa-pen"></i>

            Enter Receipt Details

        </h3>

        <div class="row g-3">

            <div class="col-md-3">

                <input type="text"
                       id="studentId"
                       class="form-control"
                       placeholder="Student ID">

            </div>

            <div class="col-md-3">

                <input type="text"
                       id="studentName"
                       class="form-control"
                       placeholder="Student Name">

            </div>

            <div class="col-md-3">

                <input type="text"
                       id="studentClass"
                       class="form-control"
                       placeholder="Class">

            </div>

            <div class="col-md-3">

                <input type="number"
                       id="feesAmount"
                       class="form-control"
                       placeholder="Fees Amount">

            </div>

        </div>

        <div class="text-center mt-4">

            <button class="btn-main btn-download px-5"
                    onclick="generateReceipt()">

                <i class="fa-solid fa-file-invoice"></i>

                Generate Receipt

            </button>

        </div>

    </div>

    <!-- RECEIPT -->

    <div class="receipt-box"
         id="receiptBox"
         style="display:none;">

        <div class="receipt-header">

            <h2>
                Sivani Coaching Center
            </h2>

            <h5>
                Fees Payment Receipt
            </h5>

        </div>

        <div class="receipt-details">

            <p>
                <strong>Receipt No :</strong>
                <span id="receiptNo"></span>
            </p>

            <p>
                <strong>Date :</strong>
                <span id="receiptDate"></span>
            </p>

            <p>
                <strong>Student ID :</strong>
                <span id="showId"></span>
            </p>

            <p>
                <strong>Student Name :</strong>
                <span id="showName"></span>
            </p>

            <p>
                <strong>Class :</strong>
                <span id="showClass"></span>
            </p>

        </div>

        <div class="amount-box">

            <h4>Fees Paid Amount</h4>

            <h1 id="showAmount"></h1>

        </div>

        <div class="signature">

            <h5>
                Authorized Signature
            </h5>

        </div>

    </div>

    <!-- PRINT BUTTON -->

    <div class="text-center mt-4 no-print d-flex justify-content-center gap-3">

        <button class="btn btn-primary px-5 py-3"
                onclick="printReceipt()">

            <i class="fa-solid fa-download me-2"></i>

            Download/Print Receipt

        </button>

        <a href="index.html" class="btn btn-dark px-5 py-3 d-flex align-items-center justify-content-center">
            <i class="fa-solid fa-house me-2"></i>

            Admin Home

        </a>

    </div>

</div>

<!-- FOOTER -->

<div class="footer no-print">

    © 2026 Sivani Coaching Center

</div>

<!-- SCRIPT -->

<script>

function generateReceipt(){

    let id =
        document.getElementById("studentId").value;

    let name =
        document.getElementById("studentName").value;

    let studentClass =
        document.getElementById("studentClass").value;

    let amount =
        document.getElementById("feesAmount").value;

    if(id=="" ||
       name=="" ||
       studentClass=="" ||
       amount==""){

        alert("Please Fill All Fields");

        return;

    }

    let receiptNo =
        "SCC" + Math.floor(Math.random()*100000);

    let today =
        new Date().toLocaleDateString();

    document.getElementById("receiptBox").style.display =
        "block";

    document.getElementById("receiptNo").innerHTML =
        receiptNo;

    document.getElementById("receiptDate").innerHTML =
        today;

    document.getElementById("showId").innerHTML =
        id;

    document.getElementById("showName").innerHTML =
        name;

    document.getElementById("showClass").innerHTML =
        studentClass;

    document.getElementById("showAmount").innerHTML =
        "₹" + amount;

}


// PRINT / DOWNLOAD PDF

function printReceipt(){

    window.print();

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
