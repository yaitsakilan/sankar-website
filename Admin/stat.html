<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Stationery Amount</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Excel Library -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fe;
        }

        /* HEADER */

        .header-section{
            background:linear-gradient(135deg,#1b2a52,#29417d);
            color:white;
            text-align:center;
            padding:45px 20px;
            border-bottom-left-radius:30px;
            border-bottom-right-radius:30px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-home-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            transition: 0.3s;
        }

        .back-home-btn:hover{
            background: white;
            color: #1b2a52;
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-section h1{
            font-size:40px;
            font-weight:700;
        }

        .header-section p{
            font-size:17px;
            margin-top:10px;
            opacity:0.9;
        }

        /* MAIN BOX */

        .main-box{
            background:white;
            margin-top:40px;
            padding:35px;
            border-radius:25px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.08);
        }

        .section-title{
            color:#1b2a52;
            font-weight:700;
            margin-bottom:25px;
        }

        /* FORM */

        .form-control{
            height:55px;
            border-radius:12px;
            border:1px solid #dcdcdc;
            padding-left:15px;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:none;
        }

        /* BUTTON */

        .btn-main{
            height:55px;
            border:none;
            border-radius:12px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-add{
            background:#0d6efd;
            color:white;
        }

        .btn-add:hover{
            background:#084298;
        }

        /* TABLE */

        .table-box{
            margin-top:35px;
            border-radius:18px;
            overflow:hidden;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1b2a52;
            color:white;
        }

        .table th{
            padding:18px;
            text-align:center;
            font-weight:600;
        }

        .table td{
            text-align:center;
            vertical-align:middle;
            padding:15px;
        }

        .table tbody tr:hover{
            background:#f4f8ff;
        }

        /* ACTION BUTTONS */

        .btn-update{
            background:#ffc107;
            color:black;
            border:none;
            border-radius:8px;
            padding:8px 14px;
            font-weight:600;
            margin-right:5px;
        }

        .btn-delete{
            background:#dc3545;
            color:white;
            border:none;
            border-radius:8px;
            padding:8px 14px;
            font-weight:600;
        }

        /* TOTAL */

        .total-box{
            margin-top:30px;
            background:#eef3ff;
            padding:20px;
            border-radius:18px;
            text-align:center;
        }

        .total-box h2{
            color:#1b2a52;
            font-weight:700;
        }

        .total-box h1{
            color:#198754;
            font-weight:700;
        }

        /* FOOTER */

        .footer{
            text-align:center;
            margin-top:50px;
            padding:20px;
            color:#555;
            font-size:15px;
        }

    </style>

</head>

<body>

<section class="header-section">

    <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>

    <div class="container">

        <h1>
            <i class="fa-solid fa-money-bill-wave"></i>
            Student Stationery Amount
        </h1>

        <p>
            Manage Student Stationery Payments
        </p>

    </div>

</section>

<!-- MAIN -->

<div class="container">

    <div class="main-box">

        <h3 class="section-title">

            <i class="fa-solid fa-plus"></i>

            Add Stationery Amount

        </h3>

        <!-- FORM -->

        <div class="row g-3">

            <!-- STUDENT DROPDOWN -->

            <div class="col-md-4">

                <select id="studentId"
                        class="form-control"
                        onchange="fillStudentName()">

                </select>

            </div>

            <!-- STUDENT NAME -->

            <div class="col-md-4">

                <input type="text"
                       id="studentName"
                       class="form-control"
                       placeholder="Student Name"
                       readonly>

            </div>

            <!-- AMOUNT -->

            <div class="col-md-2">

                <input type="number"
                       id="amount"
                       class="form-control"
                       placeholder="Amount">

            </div>

            <!-- BUTTON -->

            <div class="col-md-2">

                <button class="btn-main btn-add w-100"
                        id="addBtn"
                        onclick="addAmount()">

                    Add

                </button>

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Student ID</th>
                        <th>Student Name</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="amountTable">
                </tbody>

            </table>

        </div>

        <!-- TOTAL -->

        <div class="total-box">

            <h2>Total Amount</h2>

            <h1 id="totalAmount">₹0</h1>

        </div>

        <!-- DOWNLOAD BUTTON -->

        <div class="text-center mt-4">

            <button class="btn btn-success btn-lg"
                    onclick="downloadExcel()">

                <i class="fa-solid fa-file-excel"></i>

                Download Excel

            </button>

             <!-- ADMIN HOME BUTTON -->
    <a href="index.html"
       class="btn btn-dark ms-2">

        <i class="fa-solid fa-house"></i>

        Admin Home

    </a>

        </div>

    </div>

</div>

<!-- FOOTER -->

<div class="footer">

    © 2026 Tuition Center Management System

</div>

<!-- SCRIPT -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>

// GET STUDENTS
let students = [];

// GET STATIONERY DATA
let amounts = [];

let editIndex = -1;

loadData();

async function loadData() {
    await loadStudentDropdown();
    await loadAmounts();
}


// LOAD STUDENT DROPDOWN
async function loadStudentDropdown(){

    let dropdown =
        document.getElementById("studentId");

    dropdown.innerHTML =
        `<option value="">Select Student</option>`;

    const { data, error } = await _supabase
        .from('students')
        .select('*')
        .order('student_id', { ascending: true });

    if (error) {
        console.error("Error loading students for dropdown:", error);
        return;
    }

    students = data;

    students.forEach((student,index)=>{

        dropdown.innerHTML += `

        <option value="${index}">

            ${student.student_id} - ${student.name}

        </option>

        `;

    });

}


// AUTO FILL NAME
function fillStudentName(){

    let index =
        document.getElementById("studentId").value;

    if(index !== ""){

        document.getElementById("studentName").value =
            students[index].name;

    }
    else{

        document.getElementById("studentName").value = "";

    }

}


// ADD AMOUNT
async function addAmount(){

    let index =
        document.getElementById("studentId").value;

    let amount =
        document.getElementById("amount").value;

    if(index=="" || amount==""){

        alert("Please Fill All Fields");

        return;

    }

    let student = students[index];

    const { error } = await _supabase
        .from('stationery_payments')
        .insert([{
            student_id: student.student_id,
            amount: Number(amount),
            date: new Date().toISOString().split('T')[0]
        }]);

    if (error) {
        alert("Error saving stationery amount: " + error.message);
        return;
    }

    loadAmounts();

    clearForm();

}


// LOAD TABLE
async function loadAmounts(){

    let table =
        document.getElementById("amountTable");

    table.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";

    const { data, error } = await _supabase
        .from('stationery_payments')
        .select(`
            id,
            student_id,
            amount,
            date,
            students (
                name
            )
        `);

    if (error) {
        console.error("Error loading stationery payments:", error);
        table.innerHTML = "<tr><td colspan='5' class='text-danger'>Error loading data</td></tr>";
        return;
    }

    amounts = data;
    table.innerHTML = "";

    let total = 0;

    amounts.forEach((data,index)=>{

        total += Number(data.amount);
        let studentName = data.students ? data.students.name : 'Unknown';

        // Format date from YYYY-MM-DD to local string or display directly
        let displayDate = data.date;

        table.innerHTML += `

        <tr>

            <td>${data.student_id}</td>

            <td>${studentName}</td>

            <td>₹${data.amount}</td>

            <td>${displayDate}</td>

            <td>

                <button class="btn-update"
                        onclick="editAmount(${index})">

                    <i class="fa-solid fa-pen"></i>
                    Update

                </button>

                <button class="btn-delete"
                        onclick="deleteAmount(${data.id})">

                    <i class="fa-solid fa-trash"></i>
                    Delete

                </button>

            </td>

        </tr>

        `;

    });

    document.getElementById("totalAmount").innerHTML =
        "₹" + total;

}


// DELETE
async function deleteAmount(id){

    if(confirm("Delete this record?")){

        const { error } = await _supabase
            .from('stationery_payments')
            .delete()
            .eq('id', id);

        if (error) {
            alert("Error deleting record: " + error.message);
            return;
        }

        loadAmounts();

    }

}


// EDIT
function editAmount(index){

    editIndex = index;
    let payment = amounts[index];

    let studentIndex =
        students.findIndex(student =>
            student.student_id == payment.student_id
        );

    document.getElementById("studentId").value =
        studentIndex;

    document.getElementById("studentName").value =
        payment.students ? payment.students.name : 'Unknown';

    document.getElementById("amount").value =
        payment.amount;

    document.getElementById("addBtn").innerHTML =
        "Update";

    document.getElementById("addBtn").onclick =
        updateAmount;

}


// UPDATE
async function updateAmount(){

    let index =
        document.getElementById("studentId").value;

    let student = students[index];
    let amount = document.getElementById("amount").value;
    let paymentId = amounts[editIndex].id;

    const { error } = await _supabase
        .from('stationery_payments')
        .update({
            student_id: student.student_id,
            amount: Number(amount)
        })
        .eq('id', paymentId);

    if (error) {
        alert("Error updating record: " + error.message);
        return;
    }

    loadAmounts();

    clearForm();

    document.getElementById("addBtn").innerHTML =
        "Add";

    document.getElementById("addBtn").onclick =
        addAmount;

}


// CLEAR FORM
function clearForm(){

    document.getElementById("studentId").value = "";

    document.getElementById("studentName").value = "";

    document.getElementById("amount").value = "";

}


// DOWNLOAD EXCEL
function downloadExcel(){

    let excelData = amounts.map(data => {
        let studentName = data.students ? data.students.name : 'Unknown';
        return {
            "Student ID": data.student_id,
            "Student Name": studentName,
            "Amount": data.amount,
            "Date": data.date
        };
    });

    let worksheet =
        XLSX.utils.json_to_sheet(excelData);

    let workbook =
        XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        workbook,
        worksheet,
        "Stationery Amount"
    );

    XLSX.writeFile(
        workbook,
        "Stationery_Report.xlsx"
    );

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
