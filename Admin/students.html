<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Management - Sivani Coaching Center</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fe;
        }

        /* HEADER */

        .header-section{
            background:linear-gradient(135deg,#1b2a52,#29417d);
            color:white;
            text-align:center;
            padding:45px 20px;
            border-bottom-left-radius:30px;
            border-bottom-right-radius:30px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-home-btn{
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 8px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            transition: 0.3s;
        }

        .back-home-btn:hover{
            background: white;
            color: #1b2a52;
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-section h1{
            font-size:42px;
            font-weight:700;
        }

        .header-section p{
            font-size:17px;
            margin-top:10px;
            opacity:0.9;
        }

        /* MAIN BOX */

        .main-box{
            background:white;
            margin-top:40px;
            padding:35px;
            border-radius:25px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.08);
        }

        .section-title{
            color:#1b2a52;
            font-weight:700;
            margin-bottom:25px;
        }

        /* FORM */

        .form-control{
            height:55px;
            border-radius:12px;
            border:1px solid #dcdcdc;
            padding-left:15px;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:none;
        }

        /* BUTTONS */

        .btn-main{
            height:55px;
            border:none;
            border-radius:12px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-add{
            background:#0d6efd;
            color:white;
        }

        .btn-add:hover{
            background:#084298;
        }

        /* TABLE */

        .table-box{
            margin-top:35px;
            border-radius:18px;
            overflow:hidden;
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1b2a52;
            color:white;
        }

        .table th{
            padding:18px;
            text-align:center;
            font-weight:600;
        }

        .table td{
            text-align:center;
            vertical-align:middle;
            padding:15px;
        }

        .table tbody tr:hover{
            background:#f4f8ff;
        }

        /* ACTION BUTTONS */

        .btn-update{
            background:#ffc107;
            color:black;
            border:none;
            border-radius:8px;
            padding:8px 14px;
            font-weight:600;
            margin-right:5px;
        }

        .btn-update:hover{
            background:#e0a800;
        }

        .btn-delete{
            background:#dc3545;
            color:white;
            border:none;
            border-radius:8px;
            padding:8px 14px;
            font-weight:600;
        }

        .btn-delete:hover{
            background:#bb2d3b;
        }

        /* FOOTER */

        .footer{
            text-align:center;
            margin-top:50px;
            padding:20px;
            color:#555;
            font-size:15px;
        }

    </style>

</head>

<body>

<section class="header-section">

    <a href="index.html" class="back-home-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>

    <div class="container">

        <h1>
            <i class="fa-solid fa-user-graduate"></i>
            Student Management
        </h1>

        <p>
            Sivani Coaching Center Student Registration & Directory
        </p>

    </div>

</section>

<!-- MAIN -->

<div class="container">

    <div class="main-box">

        <h3 class="section-title">

            <i class="fa-solid fa-user-plus"></i>

            Add Student Details

        </h3>

        <!-- FORM -->

        <div class="row g-3">

            <div class="col-md-2">

                <input type="text"
                       id="studentId"
                       class="form-control"
                       placeholder="Student ID">

            </div>

            <div class="col-md-3">

                <input type="text"
                       id="studentName"
                       class="form-control"
                       placeholder="Student Name">

            </div>

            <div class="col-md-2">

                <input type="text"
                       id="studentClass"
                       class="form-control"
                       placeholder="Class">

            </div>

            <div class="col-md-3">

                <input type="text"
                       id="studentPhone"
                       class="form-control"
                       placeholder="Phone Number">

            </div>

            <div class="col-md-2">

                <button class="btn-main btn-add w-100"
                        id="addBtn"
                        onclick="addStudent()">

                    Add Student

                </button>

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Phone</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="studentTable">
                </tbody>

            </table>

        </div>

        <!-- BUTTONS -->

        <div class="text-center mt-5">

            <a href="index.html" class="btn btn-dark btn-lg px-5 py-3 rounded-pill">
                <i class="fa-solid fa-house me-2"></i>
                Back to Dashboard
            </a>

        </div>

    </div>

</div>

<!-- FOOTER -->

<div class="footer">

    © 2026 Tuition Center Management System

</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>

let students = [];
let editIndex = -1;

loadStudents();


// ADD STUDENT

async function addStudent(){

    let id =
        document.getElementById("studentId").value;

    let name =
        document.getElementById("studentName").value;

    let studentClass =
        document.getElementById("studentClass").value;

    let phone =
        document.getElementById("studentPhone").value;

    if(id=="" || name=="" || studentClass==""){

        alert("Please Fill All Fields");

        return;
    }

    const { error } = await _supabase
        .from('students')
        .insert([{
            student_id: id,
            name: name,
            student_class: studentClass,
            phone: phone
        }]);

    if (error) {
        alert("Error adding student: " + error.message);
        return;
    }

    loadStudents();

    clearForm();

}


// LOAD STUDENTS

async function loadStudents(){

    let table =
        document.getElementById("studentTable");

    table.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";

    const { data, error } = await _supabase
        .from('students')
        .select('*')
        .order('student_id', { ascending: true });

    if (error) {
        console.error("Error loading students:", error);
        table.innerHTML = "<tr><td colspan='5' class='text-danger'>Error loading data</td></tr>";
        return;
    }

    students = data;
    table.innerHTML="";

    students.forEach((student,index)=>{

        table.innerHTML += `

        <tr>

            <td>${student.student_id}</td>

            <td>${student.name}</td>

            <td>${student.student_class}</td>

            <td>${student.phone || ''}</td>

            <td>

                <button class="btn-update"
                        onclick="editStudent(${index})">

                    <i class="fa-solid fa-pen"></i>

                    Update

                </button>

                <button class="btn-delete"
                        onclick="deleteStudent(${index})">

                    <i class="fa-solid fa-trash"></i>

                    Delete

                </button>

            </td>

        </tr>

        `;

    });

}


// DELETE

async function deleteStudent(index){

    let student = students[index];
    if(confirm(`Delete student ${student.name} (ID: ${student.student_id})?`)){

        const { error } = await _supabase
            .from('students')
            .delete()
            .eq('student_id', student.student_id);

        if (error) {
            alert("Error deleting student: " + error.message);
            return;
        }

        loadStudents();

    }

}


// EDIT

function editStudent(index){

    editIndex = index;
    let student = students[index];

    document.getElementById("studentId").value = student.student_id;
    document.getElementById("studentId").disabled = true;

    document.getElementById("studentName").value = student.name;

    document.getElementById("studentClass").value = student.student_class;

    document.getElementById("studentPhone").value = student.phone || '';

    document.getElementById("addBtn").innerHTML =
        "Update Student";

    document.getElementById("addBtn").onclick =
        updateStudent;

}


// UPDATE

async function updateStudent(){

    let id = document.getElementById("studentId").value;
    let name = document.getElementById("studentName").value;
    let studentClass = document.getElementById("studentClass").value;
    let phone = document.getElementById("studentPhone").value;

    const { error } = await _supabase
        .from('students')
        .update({
            name: name,
            student_class: studentClass,
            phone: phone
        })
        .eq('student_id', id);

    if (error) {
        alert("Error updating student: " + error.message);
        return;
    }

    loadStudents();

    clearForm();

    document.getElementById("studentId").disabled = false;

    document.getElementById("addBtn").innerHTML =
        "Add Student";

    document.getElementById("addBtn").onclick =
        addStudent;

}


// CLEAR FORM

function clearForm(){

    document.getElementById("studentId").value="";
    document.getElementById("studentId").disabled = false;

    document.getElementById("studentName").value="";

    document.getElementById("studentClass").value="";

    document.getElementById("studentPhone").value="";

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
